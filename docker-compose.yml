services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: logisync-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Config WAL Archiving for Point-in-Time Recovery (PITR):
    # - wal_level=replica: log enough WAL information to support replication & PITR
    # - archive_mode=on: enable WAL archiving
    # - archive_command: script to push WAL segments to MinIO
    # - archive_timeout=300: force archive every 5 minutes even if WAL is not full (16MB)
    command: >
      postgres
      -c wal_level=logical
      -c archive_mode=on
      -c archive_command='/scripts/wal-archive.sh %p %f'
      -c archive_timeout=300
      -c max_replication_slots=10
      -c max_wal_senders=10
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-audit-data:/var/lib/postgresql/audit
      - postgres-wal-archive:/var/lib/postgresql/wal-archive
      - ./docker/postgres/wal-archive.sh:/scripts/wal-archive.sh:ro
    networks:
      - logisync-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_replica:
    image: timescale/timescaledb:latest-pg16
    container_name: logisync-db-replica
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5433:5432'
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    networks:
      - logisync-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: logisync-redis
    ports:
      - '6379:6379'
    networks:
      - logisync-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: logisync-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    networks:
      - logisync-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: logisync-broker
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - logisync-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

# Định nghĩa thêm API, Worker, và GPS Ingestion sau

  prometheus:
    image: prom/prometheus:latest
    container_name: logisync-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - logisync-network
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  grafana:
    image: grafana/grafana:latest
    container_name: logisync-grafana
    ports:
      - '3001:3000'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - logisync-network
    restart: unless-stopped

networks:
  logisync-network:
    driver: bridge

volumes:
  postgres-data:
  postgres-audit-data:
  postgres-wal-archive:
  minio-data:
  rabbitmq-data:
  postgres-replica-data:
  prometheus-data:
  grafana-data:
