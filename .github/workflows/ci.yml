name: LogiSync CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write
  packages: write

jobs:
  # 1. AUTO LABEL PR
  labeler:
    name: Auto Label PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/labeler@v5

  # 2. DETECT CHANGES
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            frontend:
              - 'apps/web/**'
              - 'apps/mobile/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'

  # 3. QUALITY CHECK
  # Global Biome check + Deep ESLint for API only
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Global Fast Lint (Biome)
        run: pnpm lint:fast

      - name: Deep API Lint (ESLint)
        run: pnpm lint:api

  # 4. BACKEND BUILD & SIZE
  build-api:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: ${{ needs.changes.outputs.api == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build API
        run: pnpm turbo build --filter="@logisync/api..."

      - name: Build Size Report
        run: |
          echo "### LogiSync Build Size Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Size | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          if [ -d "apps/api/dist" ]; then
            echo "| Backend (API) | $(du -sh apps/api/dist | cut -f1) | ✅ |" >> $GITHUB_STEP_SUMMARY
          fi

  # 5. DOCKER & PERFORMANCE
  docker-and-perf:
    name: Docker & Performance
    runs-on: ubuntu-latest
    needs: [changes, build-api]
    if: ${{ needs.changes.outputs.api == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          load: true
          tags: logisync-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Analyze Image Size
        run: |
          RAW_SIZE=$(docker images --format "{{.Size}}" logisync-api:latest)
          echo "### 🐳 Docker Optimization Report" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Final Image Size** | $RAW_SIZE |" >> $GITHUB_STEP_SUMMARY

          SIZE_BYTES=$(docker inspect logisync-api:latest --format='{{.Size}}')
          SIZE_MB=$((SIZE_BYTES / 1048576))
          if (( SIZE_MB < 300 )); then
            echo "| **Optimization Check** | ✅ Lean ($SIZE_MB MB) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Optimization Check** | ⚠️ Heavy ($SIZE_MB MB) |" >> $GITHUB_STEP_SUMMARY
          fi

  # 6. WEB BUILD
  build-web:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build Web
        run: pnpm turbo build --filter="@logisync/web..."

      - name: Build Size Report
        run: |
          echo "### Frontend Build Size Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Size | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          if [ -d "apps/web/.next" ]; then
            echo "| Frontend (Web) | $(du -sh apps/web/.next | cut -f1) | ✅ |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Performance Targets
        run: |
          echo "### API Performance Targets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ General API Response: < 500ms" >> $GITHUB_STEP_SUMMARY
          echo "✅ Business Operations: 3-5 seconds" >> $GITHUB_STEP_SUMMARY
          echo "✅ Search Operations: 2-3 seconds" >> $GITHUB_STEP_SUMMARY

  # 6. FINAL NOTIFICATION
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [labeler, quality, docker-and-perf]
    if: always()
    steps:
      - name: Check Final Status
        run: |
          if [[ "${{ needs.quality.result }}" == "success" && ("${{ needs.docker-and-perf.result }}" == "success" || "${{ needs.docker-and-perf.result }}" == "skipped") ]]; then
            echo "🎉 Build and Quality checks passed!"
          else
            echo "🚨 CI failed - please check the logs."
            exit 1
          fi
