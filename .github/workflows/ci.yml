name: LogiSync CI

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main', 'develop']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write
  packages: write

jobs:
  # 1. AUTO LABEL PR
  labeler:
    name: Auto Label PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/labeler@v5

  # 2. DETECT CHANGES
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            frontend:
              - 'apps/web/**'
              - 'apps/mobile/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'

  # 3. QUALITY CHECK
  # Global Biome check + Deep ESLint for API only
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Global Fast Lint (Biome)
        run: pnpm lint:fast

      - name: Deep API Lint (ESLint)
        run: pnpm lint:api

  # 4. BACKEND BUILD & SIZE
  build-api:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: ${{ needs.changes.outputs.api == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build API
        run: pnpm turbo build --filter="@logisync/api..."

      - name: Build Size Report
        run: |
          echo "### LogiSync Build Size Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Size | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          if [ -d "apps/api/dist" ]; then
            echo "| Backend (API) | $(du -sh apps/api/dist | cut -f1) | ✅ |" >> $GITHUB_STEP_SUMMARY
          fi

  # 5. BACKEND TESTS
  test-api:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [changes, build-api]
    if: ${{ needs.changes.outputs.api == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Create test environment
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=logisync
          POSTGRES_PASSWORD=logisync
          POSTGRES_DB=logisync
          DATABASE_URL=postgresql://logisync:logisync@localhost:5432/logisync
          DATABASE_REPLICA_URL=postgresql://logisync:logisync@localhost:5432/logisync
          REDIS_URL=redis://localhost:6379
          RABBITMQ_URL=amqp://logisync:logisync@localhost:5672
          RABBITMQ_USER=logisync
          RABBITMQ_PASSWORD=logisync
          MINIO_ENDPOINT=localhost
          MINIO_PORT=9000
          MINIO_USE_SSL=false
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          MINIO_BUCKET_NAME=logisync-bucket
          JWT_SECRET=ci_test_secret
          ALERT_EMAIL_TO=ops@example.test
          SMTP_HOST=smtp.example.test
          SMTP_PORT=587
          SMTP_USER=alerts@example.test
          SMTP_PASS=secret
          EOF

      - name: Start API infrastructure
        run: pnpm db:up

      - name: Wait for Database readiness
        run: sleep 5

      - name: Setup API database
        run: pnpm db:setup

      - name: Run API unit and integration tests
        run: pnpm test:api

      - name: Run API E2E tests
        run: pnpm test:api:e2e

      - name: Stop API infrastructure
        if: always()
        run: pnpm db:down

  # 6. DOCKER & PERFORMANCE
  docker-and-perf:
    name: Docker & Performance
    runs-on: ubuntu-latest
    needs: [changes, build-api]
    if: ${{ needs.changes.outputs.api == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          load: true
          tags: logisync-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Analyze Image Size
        run: |
          RAW_SIZE=$(docker images --format "{{.Size}}" logisync-api:latest)
          SIZE_BYTES=$(docker inspect logisync-api:latest --format='{{.Size}}')
          SIZE_MB=$((SIZE_BYTES / 1048576))

          echo "### 🐳 Docker Optimization Report" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| :--- | :--- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Final Image Size** | $RAW_SIZE |" >> "$GITHUB_STEP_SUMMARY"

          if (( SIZE_MB < 450 )); then
            echo "| **Status** | ✅ **Lean** ($SIZE_MB MiB) |" >> "$GITHUB_STEP_SUMMARY"
          elif (( SIZE_MB < 800 )); then
            echo "| **Status** | 🟡 **Healthy** ($SIZE_MB MiB) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| **Status** | ⚠️ **Heavy** ($SIZE_MB MiB) |" >> "$GITHUB_STEP_SUMMARY"
          fi

  # 7. WEB BUILD
  build-web:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Web
        run: pnpm turbo build --filter="@logisync/web..."

      - name: Build Size Report
        run: |
          echo "### Frontend Build Size Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Size | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          if [ -d "apps/web/.next" ]; then
            echo "| Frontend (Web) | $(du -sh apps/web/.next | cut -f1) | ✅ |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Performance Targets
        run: |
          echo "### API Performance Targets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ General API Response: < 500ms" >> $GITHUB_STEP_SUMMARY
          echo "✅ Business Operations: 3-5 seconds" >> $GITHUB_STEP_SUMMARY
          echo "✅ Search Operations: 2-3 seconds" >> $GITHUB_STEP_SUMMARY

  # 8. FINAL NOTIFICATION
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [labeler, quality, test-api, docker-and-perf]
    if: always()
    steps:
      - name: Check Final Status
        run: |
          if [[ "${{ needs.quality.result }}" == "success" && ("${{ needs.test-api.result }}" == "success" || "${{ needs.test-api.result }}" == "skipped") && ("${{ needs.docker-and-perf.result }}" == "success" || "${{ needs.docker-and-perf.result }}" == "skipped") ]]; then
            echo "🎉 Build and Quality checks passed!"
          else
            echo "🚨 CI failed - please check the logs."
            exit 1
          fi
